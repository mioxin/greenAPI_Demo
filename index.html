<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>GREEN API</title>

  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

<div class="container">

  <div class="left">

    <div class="block">
      <input id="idInstance" placeholder="idInstance" />
      <input id="apiTokenInstance" placeholder="ApiTokenInstance" />
    </div>

    <div class="block">
      <button id="btnGetSettings">getSettings</button>
      <button id="btnGetState">getStateInstance</button>
    </div>

    <div class="block">
      <input id="phone" placeholder="77771234567" />
      <input id="message" placeholder="Hello World" />
      <button id="btnSendMessage">sendMessage</button>
    </div>

    <div class="block">
      <input id="phoneFile" placeholder="77771234567" />
      <input id="fileUrl" placeholder="https://example.com/file.jpg" />
      <button id="btnSendFile">sendFileByUrl</button>
    </div>

    <div id="error" class="error"></div>

  </div>

  <div class="right">
    <h3>Ответ:</h3>
    <textarea id="response" readonly></textarea>
  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
